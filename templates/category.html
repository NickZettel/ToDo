<body style="background: var(--bs-secondary-bg-subtle);transform: translate(-98px);padding-right: 0px;margin-right: -123px;padding-left: 82px;">

    </div>
    <nav class="navbar navbar-expand-md bg-body" style="color:rgb(142,142,43);height:53px;">

            <div class="collapse navbar-collapse d-xl-flex d-xxl-flex ms-0 ps-0" id="navcol-2">
                <ul class="navbar-nav" style="margin-left: -14px;">
                    <li class="nav-item" id="homeicon" style="padding-left: 0px;margin-left: 4px;"><a class="nav-link active" href="index.html" style="color:#f1a74c;"><svg fill="none" height="1em" style="font-size:23px;width:30px;color:rgb(142,142,89);" viewbox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M21 8.77217L14.0208 1.79299C12.8492 0.621414 10.9497 0.621413 9.77817 1.79299L3 8.57116V23.0858H10V17.0858C10 15.9812 10.8954 15.0858 12 15.0858C13.1046 15.0858 14 15.9812 14 17.0858V23.0858H21V8.77217ZM11.1924 3.2072L5 9.39959V21.0858H8V17.0858C8 14.8767 9.79086 13.0858 12 13.0858C14.2091 13.0858 16 14.8767 16 17.0858V21.0858H19V9.6006L12.6066 3.2072C12.2161 2.81668 11.5829 2.81668 11.1924 3.2072Z" fill="currentColor" fill-rule="evenodd"></path></svg></a></li>

    <div class="container" style="background: rgba(255,255,255,0);padding-bottom: 13px;border-radius: 35px;width: 717px;height: 1200px;margin-bottom: 22px;margin-top: 85px;padding-top: 1px;">
        <div style="text-align: center;">
            <h1 class="mt-4" style="text-align: center;color: rgb(241,158,56);font-family: ABeeZee, sans-serif;font-size: 31px;margin-top: 0px;border-color: rgb(100,102,52);"><span style="color: rgb(100, 102, 52);">Category</span></h1><img src="assets/img/logo.gif" width="214" height="209" style="text-align: left;">
        </div>
        <div class="d-flex justify-content-between align-items-xxl-center mb-2" style="padding-right: 0px;margin-bottom: 5px;">
            <div class="d-xxl-flex align-items-xxl-center"><button class="btn btn-success text-start btn-success" style="background: #ffffff;border-radius: 12px;border-width: 0px;margin-left: 4px;color: rgb(100,102,52);box-shadow: 1px 1px;padding: 5px 12px;" data-toggle="modal" data-target="#deleteCategoryModal">Delete Category</button><button class="btn btn-success text-start" data-toggle="modal" data-target="#addCategoryModal" style="background: #646634;border-radius: 12px;margin-left: 6px;border-width: 0px;transform: translate(322px);box-shadow: 1px 1px 4px rgba(139,139,139,0.86);margin-right: 8px;padding: 5px 12px;" data-bs-target="#addCategoryModal" data-bs-toggle="modal"><span style="color: rgb(241, 158, 56);">Add Category</span></button><a class="btn btn-secondary" role="button" href="#" style="background: rgb(241,158,56);color: rgb(255,255,255);border-width: 0px;border-color: rgba(4,4,4,0);text-align: center;transform: translate(322px);width: 79px;border-radius: 12px;box-shadow: 1px 1px 4px rgba(139,139,139,0.86);margin-right: 11px;padding: 5px 12px;">Help</a></div>
        </div>
        <div style="border-radius: 0px;border-width: 0px;">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th style="text-align: center;color: rgb(245,225,196);background: rgb(99,102,43);border-radius: 0px;border-width: 1px;border-color: #ffffff;padding-left: 2px;width: 250px;">Ctegory Name</th>
                        <th style="text-align: center;color: rgb(245,225,196);background: rgb(99,102,43);border-radius: 0px;border-width: 1px;border-color: #ffffff;">Description</th>
                        <th style="text-align: center;color: rgb(245,225,196);background: rgb(99,102,43);border-radius: 0px;border-width: 1px;border-color: #ffffff;width: 250px;">Update</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="text-align: center;background: rgb(249,224,192);border-radius: 0px;border-width: 1px;border-color: #ffffff;">{{ task[1] }}</td>
                        <td style="text-align: center;background: rgb(249,224,192);border-radius: 0px;border-width: 1px;border-color: #ffffff;width: 250px;">{{ task[2] }}</td>
                        <td style="text-align: center;background: rgb(249,224,192);border-radius: 0px;border-width: 1px;border-color: #ffffff;"><button class="btn btn-secondary btn-sm" data-target="editCategoryModal" data-task="{{ task }}" data-toggle="modal" type="button" style="background: rgb(241,158,56);width: 56.5px;border-width: 0px;" data-bs-target="#editCategoryModa" data-bs-toggle="modal"> Edit </button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="modal fade" role="dialog" tabindex="-1" id="addCategoryModal" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--bs-gray-100);height: 78px;">
                    <h5 class="modal-title" id="addTaskModalLabel-2">Add Category</h5><button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">×</span></button>
                </div>
                <div class="modal-body" style="background: rgba(249,224,192,0.59);height: 272px;">
                    <form action="{{ url_for('add_task') }}" id="addTaskForm-2" method="post">
                        <div class="form-group"><label class="form-label" for="new_task_name" style="margin-left: 15px;">Category Name</label><input class="form-control form-control" type="text" id="new_task_name-1" name="task_name" required="" style="background: rgba(255,255,255,0.62);border-radius: 16px;border-width: 0px;"></div>
                        <div class="form-group" style="border-width: 0px;"><label class="form-label" for="new_description" style="border-width: 0px;margin-left: 15px;">Description</label><input class="form-control form-control" type="text" id="new_description-1" name="description" required="" style="background: rgba(255,255,255,0.62);border-radius: 16px;border-width: 0px;"></div><button class="btn btn-primary" type="submit" style="border-width: 0px;background: #8e8e3d;">Add</button><button class="btn btn-secondary" data-dismiss="modal" type="button" style="margin-left: 5px;">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" role="dialog" tabindex="-1" id="editCategoryModa" aria-labelledby="editCategoryModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--bs-gray-100);height: 78px;">
                    <h5 class="modal-title" id="addTaskModalLabel-3">Edit Category</h5><button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">×</span></button>
                </div>
                <div class="modal-body" style="background: rgba(249,224,192,0.59);height: 272px;">
                    <form action="{{ url_for('add_task') }}" id="addTaskForm-3" method="post">
                        <div class="form-group"><label class="form-label" for="new_task_name" style="margin-left: 15px;">Category Name</label><input class="form-control form-control" type="text" id="new_task_name-2" name="task_name" required="" style="background: rgba(255,255,255,0.62);border-radius: 16px;border-width: 0px;"></div>
                        <div class="form-group" style="border-width: 0px;"><label class="form-label" for="new_description" style="border-width: 0px;margin-left: 15px;">Description</label><input class="form-control form-control" type="text" id="new_description-2" name="description" required="" style="background: rgba(255,255,255,0.62);border-radius: 16px;border-width: 0px;"></div><button class="btn btn-primary" type="submit" style="border-width: 0px;background: #8e8e3d;">Save Changes</button><button class="btn btn-secondary" data-dismiss="modal" type="button" style="margin-left: 5px;" data-bs-dismiss="modal">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" role="dialog" tabindex="-1" id="deleteCategoryModal" aria-labelledby="editCategoryModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--bs-gray-100);height: 78px;">
                    <h5 class="modal-title" id="addTaskModalLabel-1">Delete Category</h5><button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">×</span></button>
                </div>
                <div class="modal-body" style="background: rgba(249,224,192,0.59);height: 143px;">
                    <form action="{{ url_for('add_task') }}" id="addTaskForm-1" method="post">
                        <div class="form-group" style="border-width: 0px;"><label class="form-label" for="new_description" style="border-width: 0px;margin-left: -1px;">Do you want to delete this categiry?</label></div><button class="btn btn-primary" id="confirmDeleteCategory" type="button" style="border-width: 0px;background: #ff0f00;">Delete</button><button class="btn btn-secondary" data-dismiss="modal" type="button" style="margin-left: 5px;" data-bs-dismiss="modal">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div><script>
        $('#editTaskModal').on('show.bs.modal', function (event) {
            var button = $(event.relatedTarget);
            var task = button.data('task');
            var modal = $(this);
            
            modal.find('#task_id').val(task[0]);
            modal.find('#task_name').val(task[1]);
            modal.find('#category').val(task[5]);
            modal.find('#due').val(task[3]);
            modal.find('#description').val(task[2]);
            modal.find('#status').val(task[4] ? 'In Progress' : 'Not Started');
            modal.find('#reminder').val(task[6]);
        });
    </script>
